name: Build

on:
  push:
    branches:
      - "master"
    paths-ignore:
      - "*.md"
      - "*.sh"
      - "release.yaml"

  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      output: "${{ github.workspace }}/build/app/outputs/apk/release"
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download AList Source Code
        run: |
          cd $GITHUB_WORKSPACE/alist-lib/scripts
          chmod +x *.sh
          ./init_alist.sh
          ./init_web.sh

      - uses: actions/setup-go@v4
        with:
          go-version: 1.22
          cache-dependency-path: ${{ github.workspace }}/alist-lib/alist/go.sum

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2.4.2

      - name: Build AList
        run: |
          cd $GITHUB_WORKSPACE/alist-lib/scripts
          chmod +x *.sh
          ./init_gomobile.sh
          ./gobind.sh
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: "AList"
          path: "${{ github.workspace }}/android/app/libs/*.aar"

      - name: Init Signature
        run: |
          # 1. 进入 android 目录，这里是 Gradle 查找 local.properties 的默认位置
          cd android
          
          # 2. 写入签名配置信息。注意使用单引号包裹 Secrets 以处理可能的特殊字符
          echo "ALIAS_NAME='${{ secrets.ALIAS_NAME }}'" > local.properties
          echo "ALIAS_PASSWORD='${{ secrets.ALIAS_PASSWORD }}'" >> local.properties
          echo "KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'" >> local.properties
          
          # 3. 关键修复：这里的路径必须相对于 android/ 目录，或者使用绝对路径
          # 因为你的 build.gradle 使用 file(pro["KEY_PATH"])，它会基于当前项目目录查找
          echo "KEY_PATH='./app/key.jks'" >> local.properties
          
          # 4. 解码密钥文件到正确的子目录
          mkdir -p app
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > app/key.jks
          
          # 5. 验证文件是否生成成功（大小应 > 0）
          ls -l app/key.jks

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Build APK
        run: flutter build apk --split-per-abi --release

      - name: Upload missing_rules.txt
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "missing_rules"
          path: "${{ github.workspace }}/build/app/outputs/mapping/release/missing_rules.txt"

      - name: Init APP Version Name
        if: success()
        run: |
          # 提取版本号用于 Artifact 命名
          echo "ver_name=$(grep -m 1 'versionName' ${{ env.output }}/output-metadata.json | cut -d\" -f4)" >> $GITHUB_ENV

      - name: Upload App To Artifact arm64-v8a
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: "AListFlutter-v${{ env.ver_name }}_arm64-v8a"
          path: "${{ env.output }}/*-v8a.apk"

      - name: Upload App To Artifact arm-v7a
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: "AListFlutter-v${{ env.ver_name }}_arm-v7a"
          path: "${{ env.output }}/*-v7a.apk"

      - name: Upload App To Artifact x86
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: "AListFlutter-v${{ env.ver_name }}_x86_64"
          path: "${{ env.output }}/*64.apk"
